  <style>
    :root{
      --ink:#173a38;
      --teal:#0f5d5d;
      --sea:#7bd8d0;
      --cream:#fff8eb;
      --paper:#fffdf6;
      --coral:#f47d5f;
      --sun:#ffd86b;
      --lime:#c9e66b;
      --muted:#5e7772;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--paper)}
    .app-shell{
      width:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 8% 2%, rgba(123,216,208,.18), transparent 18%),
        radial-gradient(circle at 96% 6%, rgba(255,216,107,.22), transparent 18%),
        linear-gradient(180deg,#fffdf6 0%,#fffaf0 100%);
    }
    .comic{font-family:'Bangers', cursive; letter-spacing:.03em}
    .hero-shadow{text-shadow:4px 4px 0 rgba(23,58,56,.9)}
    .hard-shadow{box-shadow:8px 8px 0 var(--ink)}
    .soft-hard-shadow{box-shadow:6px 6px 0 rgba(23,58,56,.92)}
    .ink-border{border:3px solid var(--ink)}
    .hero-overlay{background:linear-gradient(90deg,rgba(10,47,47,.86) 0%,rgba(10,47,47,.55) 46%,rgba(10,47,47,.14) 100%)}
    .halftone{background-image:radial-gradient(rgba(23,58,56,.12) 1px,transparent 1px);background-size:10px 10px}
    .bubble{position:relative;border:3px solid var(--ink);border-radius:20px;background:#fff}
    .bubble:after{content:"";position:absolute;left:28px;bottom:-15px;width:22px;height:22px;background:#fff;border-right:3px solid var(--ink);border-bottom:3px solid var(--ink);transform:rotate(45deg)}
    .activity-card,.tip-card,.food-card{transition:transform .25s ease, box-shadow .25s ease}
    .activity-card:hover,.tip-card:hover,.food-card:hover{transform:translate(-2px,-3px);box-shadow:5px 5px 0 var(--ink)}
    .stage-card{animation:rise .7s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .map-frame{position:relative;overflow:hidden}
    .map-frame:after{
      content:"";
      position:absolute; inset:0;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.45), inset 0 0 35px rgba(23,58,56,.12);
      pointer-events:none;
    }
    @media print{
      .print-hide{display:none!important}
      .hero-section{height:430px!important}
      .stage-card{break-inside:avoid}
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
